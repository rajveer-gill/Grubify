# CI runs on every PR and push. Firebase Hosting + Functions deploy runs only on push to main
# (after tests pass). Add repo secret FIREBASE_SERVICE_ACCOUNT_GRUBIFY: Firebase Console →
# Project settings → Service accounts → Generate new private key (JSON). Roles should include
# Firebase Hosting Admin, Cloud Functions Admin, and Service Account User on the project.
#
# Render (Flask at grubify.onrender.com): enable Auto-Deploy from this repo in the Render
# dashboard and set FLASK_SECRET_KEY (and other env vars) there—deploy is not handled by this workflow.

name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [synchronize, opened, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.x'

      - name: Create Virtual Environment and Install Dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Run backend tests
        run: |
          source venv/bin/activate
          pytest backend/database_test.py backend/test_store_handler.py

  deploy-firebase:
    needs: build-and-run
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            functions/package-lock.json

      - name: Write Firebase service account key
        env:
          KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GRUBIFY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::error::Add GitHub secret FIREBASE_SERVICE_ACCOUNT_GRUBIFY (Firebase service account JSON)."
            exit 1
          fi
          echo "$KEY" > "$GITHUB_WORKSPACE/firebase-sa.json"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          CI: true

      - name: Install function dependencies
        working-directory: functions
        run: npm ci

      - name: Install Firebase CLI and deploy
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-sa.json
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting,functions --project grubify-9cf13 --non-interactive
